<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IP not found - Smart Honeypot IDS</title>
    <link rel="stylesheet" href="/static/dashboard.css" />
    <style>
      .nf-card {
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.10);
        border-radius: 12px;
        padding: 32px;
        text-align: center;
        max-width: 640px;
        margin: 80px auto;
      }
      .nf-ip-mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        color: #93c5fd;
        font-size: 18px;
        font-weight: 900;
      }
      .nf-code {
        color: #f87171;
        font-size: 56px;
        font-weight: 900;
        margin-bottom: 8px;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <main class="main" style="max-width: 900px; margin: 0 auto; padding: 24px;">
        <div class="nf-card">
          <div class="nf-code">404</div>
          <h1 class="h1" style="margin: 8px 0 16px 0;">IP not found</h1>
          <div class="muted" style="margin-bottom: 18px;">
            The IP <span class="nf-ip-mono">{{ ip }}</span> has no records in the honeypot database.
          </div>
          <div class="muted" style="margin-bottom: 24px; font-size: 12px;">
            No login attempts, threat alerts, or block records were found.
          </div>
          <a class="btn" href="/dashboard">Back to dashboard</a>
        </div>
      </main>
    </div>
  </body>
</html>
