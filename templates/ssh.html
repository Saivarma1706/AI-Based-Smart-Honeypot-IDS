<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSH Honeypot</title>
  <style>
    :root {
      /* Matches the enterprise dark theme background */
      --bg-page: #0f1117;
      --text-main: #e2e8f0;
      --text-muted: #9ca3af;
      --success: #4ade80;
      --error: #f87171;
      --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-page);
      color: var(--text-main);
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .terminal {
      padding: 32px;
      max-width: 800px;
      margin: 0 auto;
    }

    .system-info {
      margin-bottom: 24px;
      color: var(--text-muted);
      white-space: pre-line;
    }
    
    .system-info strong {
      color: var(--text-main);
      font-weight: normal;
    }

    .status-msg {
      margin-bottom: 24px;
      white-space: pre-line;
    }

    .msg-success {
      color: var(--success);
    }

    .msg-error {
      color: var(--error);
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .form-row {
      display: flex;
      align-items: center;
    }

    .prompt {
      color: var(--text-main);
      margin-right: 12px;
      min-width: 90px;
    }

    input[type="text"],
    input[type="password"] {
      background: transparent;
      border: none;
      color: var(--text-main);
      font-family: inherit;
      font-size: inherit;
      outline: none;
      padding: 0;
      flex: 1;
    }

    input:-webkit-autofill {
      -webkit-text-fill-color: var(--text-main);
      transition: background-color 5000s ease-in-out 0s;
    }
    
    /* A subtle focus indicator for accessibility */
    input:focus {
      border-bottom: 1px solid #334155;
    }

    .btn-connect {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-family: inherit;
      font-size: inherit;
      padding: 0;
      margin-top: 12px;
      cursor: pointer;
      text-align: left;
      width: fit-content;
      transition: color 150ms ease;
    }

    .btn-connect:hover,
    .btn-connect:focus {
      color: var(--text-main);
      outline: none;
    }
  </style>
</head>
<body>
  <div class="terminal">
    <div class="system-info">
      <strong>Ubuntu Server 24.04 LTS</strong>
      Authorized access only.
    </div>

    {% if message %}
      <div class="status-msg">
        {% if message == 'Access Granted' %}
          <div class="msg-success">Authentication successful.
Establishing secure session...
Redirecting...</div>
          <script>
            setTimeout(function() {
              window.location.href = '/dashboard';
            }, 1500);
          </script>
        {% else %}
          <div class="msg-error">Permission denied.
Please try again.</div>
        {% endif %}
      </div>
    {% endif %}

    <form method="POST" autocomplete="off">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      
      <div class="form-row">
        <span class="prompt">login as:</span>
        <input type="text" name="username" required autofocus spellcheck="false" autocomplete="off" />
      </div>
      
      <div class="form-row">
        <span class="prompt">password:</span>
        <input type="password" name="password" required autocomplete="off" />
      </div>

      <button type="submit" class="btn-connect">[ Connect ]</button>
    </form>
  </div>
</body>
</html>
