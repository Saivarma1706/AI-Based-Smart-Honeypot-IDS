<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Enterprise Web Server Administration" />
  <title>Enterprise Web Server Administration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-page: #0f1117;
      --bg-panel: #161b22;
      --bg-card: #0d1117;
      --text-main: #e2e8f0;
      --text-muted: #9ca3af;
      --border-color: #30363d;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --success: #4ade80;
      --error: #f87171;
      --font-main: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-page);
      color: var(--text-main);
      font-family: var(--font-main);
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-container {
      display: flex;
      width: 100%;
      max-width: 900px;
      background: var(--bg-panel);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.5);
      margin: 24px;
    }

    /* Left side - Login Form */
    .login-form-area {
      flex: 1;
      padding: 48px;
    }

    .form-header {
      margin-bottom: 32px;
    }

    .form-header h1 {
      margin: 0 0 8px 0;
      font-size: 24px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: -0.01em;
    }

    .form-header p {
      margin: 0;
      font-size: 14px;
      color: var(--text-muted);
    }

    .field-group {
      margin-bottom: 20px;
    }

    .field-label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-main);
    }

    .field-input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      background: #0d1117;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      color: var(--text-main);
      font-size: 14px;
      transition: border-color 0.15s;
      outline: none;
    }

    .field-input:disabled {
      background: #1c2128;
      color: var(--text-muted);
      cursor: not-allowed;
    }
    
    .field-input:focus:not(:disabled) {
      border-color: var(--accent);
    }

    .btn-submit {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 12px;
    }

    .btn-submit:hover {
      background: var(--accent-hover);
    }

    /* Right side - Info Panel */
    .info-panel {
      width: 320px;
      background: #0d1117;
      padding: 48px 32px;
      border-left: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .info-title {
      font-size: 16px;
      font-weight: 600;
      color: #ffffff;
      margin: 0 0 24px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .info-title::before {
      content: '🌐';
      font-size: 20px;
    }

    .info-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .info-list li {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      line-height: 1.5;
    }

    .info-list li::before {
      content: '•';
      color: var(--accent);
      font-size: 18px;
      line-height: 1;
    }

    /* Message Block */
    .msg-block {
      display: none;
      text-align: center;
      padding: 40px 0;
    }

    .msg-title {
      font-size: 18px;
      font-weight: 600;
      margin: 0 0 12px 0;
    }

    .msg-desc {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    @media (max-width: 768px) {
      .login-container {
        flex-direction: column;
      }
      .info-panel {
        width: 100%;
        box-sizing: border-box;
        border-left: none;
        border-top: 1px solid var(--border-color);
        padding: 32px;
      }
      .login-form-area {
        padding: 32px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <!-- Left Panel -->
    <div class="login-form-area">
      <div class="form-header">
        <h1>Enterprise Web Server</h1>
        <p>Secure Administration Console</p>
      </div>

      <div id="formBlock">
        <form method="POST" action="/server">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token else '' }}" />

          <div class="field-group">
            <label class="field-label" for="server_address">Server Address</label>
            <input type="text" id="server_address" class="field-input" value="web01.internal.local" disabled />
          </div>

          <div class="field-group">
            <label class="field-label" for="username">Username</label>
            <input type="text" id="username" name="username" class="field-input" required autocomplete="username" />
          </div>

          <div class="field-group">
            <label class="field-label" for="password">Password</label>
            <input type="password" id="password" name="password" class="field-input" required autocomplete="current-password" />
          </div>

          <button type="submit" class="btn-submit">Sign In</button>
        </form>
      </div>

      <div id="msgBlock" class="msg-block">
        <h2 id="msgTitle" class="msg-title"></h2>
        <p id="msgDesc" class="msg-desc"></p>
      </div>

    </div>

    <!-- Right Panel -->
    <div class="info-panel">
      <div class="info-title">Server Status</div>
      <ul class="info-list">
        <li>TLS Enabled</li>
        <li>Session Logging Active</li>
        <li>Request Monitoring Enabled</li>
        <li>Reverse Proxy Protected</li>
      </ul>
    </div>
  </div>

  {% if message %}
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const message = "{{ message }}";
      const formBlock = document.getElementById('formBlock');
      const msgBlock = document.getElementById('msgBlock');
      const msgTitle = document.getElementById('msgTitle');
      const msgDesc = document.getElementById('msgDesc');

      if (message) {
        formBlock.style.display = 'none';
        msgBlock.style.display = 'block';

        if (message === 'Admin Console Unlocked') {
          msgTitle.innerHTML = 'Server authenticated.';
          msgTitle.style.color = 'var(--success)';
          msgDesc.innerHTML = 'Loading administration console...<br>Redirecting...';
          setTimeout(function() {
            window.location.href = '/dashboard';
          }, 1500);
        } else {
          msgTitle.innerHTML = 'Authentication failed.';
          msgTitle.style.color = 'var(--error)';
          msgDesc.innerHTML = 'Access attempt logged.';
        }
      }
    });
  </script>
  {% endif %}
</body>
</html>
