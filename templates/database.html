<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Database Management Console</title>
  <style>
    :root {
      --bg-page: #0f1117;
      --bg-panel: #161b22;
      --text-main: #e2e8f0;
      --text-muted: #9ca3af;
      --border-color: #30363d;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --success: #4ade80;
      --error: #f87171;
      --font-main: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-page);
      color: var(--text-main);
      font-family: var(--font-main);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .login-container {
      background: var(--bg-panel);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    .login-header {
      padding: 32px 32px 16px;
      text-align: center;
    }

    .login-header h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: -0.02em;
    }

    .login-body {
      padding: 16px 32px 32px;
    }

    .status-msg {
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 24px;
      font-size: 13px;
      text-align: center;
      line-height: 1.5;
    }

    .status-success {
      background: rgba(74, 222, 128, 0.1);
      border: 1px solid rgba(74, 222, 128, 0.2);
      color: var(--success);
    }

    .status-error {
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.2);
      color: var(--error);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-main);
    }

    .form-input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 14px;
      background: #0d1117;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      color: var(--text-main);
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
    }

    .form-input:disabled {
      background: rgba(255, 255, 255, 0.03);
      color: var(--text-muted);
      cursor: not-allowed;
      border-color: rgba(255, 255, 255, 0.08);
    }

    .btn-connect {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 8px;
    }

    .btn-connect:hover {
      background: var(--accent-hover);
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-header">
      <h1>Database Management Console</h1>
    </div>

    <div class="login-body">
      {% if message %}
        {% if message == 'Database Session Established' %}
          <div class="status-msg status-success">
            Connection established.<br>
            Loading database console...<br>
            Redirecting...
          </div>
          <script>
            setTimeout(function() {
              window.location.href = '/dashboard';
            }, 1500);
          </script>
        {% else %}
          <div class="status-msg status-error">
            Access denied for user.<br>
            Authentication failed.
          </div>
        {% endif %}
      {% endif %}

      <form method="POST" autocomplete="off">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

        <div class="form-group">
          <label class="form-label">Server</label>
          <input type="text" class="form-input" value="localhost:3306" disabled />
        </div>

        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-input" required autofocus autocomplete="off" spellcheck="false" />
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-input" required autocomplete="off" />
        </div>

        <button type="submit" class="btn-connect">Connect</button>
      </form>
    </div>
  </div>

</body>
</html>
